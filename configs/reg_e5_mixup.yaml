experiment:
  name: reg_e5_mixup
  seed: 42

paths:
  data_dir: ./dataset
  checkpoint_dir: ./checkpoints
  results_dir: ./results/reg_e5_mixup

dataset:
  image_size: 224
  num_classes: 102
  batch_size: 32
  num_workers: 2
  download: true
  augmentation: true
  random_erasing_p: 0.15

model:
  name: vit_base_patch16_224.augreg_in21k
  pretrained: true

training:
  epochs: 30
  lr: 0.00003
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.1
  early_stopping:
    enabled: true
    monitor: val_accuracy
    mode: max
    patience: 7
    min_delta: 0.0
