experiment:
  name: reg_e1_augmentation
  seed: 42

paths:
  data_dir: ./dataset
  checkpoint_dir: ./checkpoints
  results_dir: ./results/reg_e1_augmentation

dataset:
  image_size: 224
  num_classes: 102
  batch_size: 32
  num_workers: 2
  download: true
  augmentation: true

model:
  name: vit_base_patch16_224.augreg_in21k
  pretrained: true

training:
  epochs: 30
  lr: 0.00003
  weight_decay: 0.01
