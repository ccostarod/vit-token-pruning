experiment:
  name: vit_b16_timm_in21k
  seed: 42

paths:
  data_dir: ./dataset
  checkpoint_dir: ./checkpoints
  results_dir: ./results/vit_b16_timm_in21k

dataset:
  image_size: 224
  num_classes: 102
  batch_size: 32
  num_workers: 2
  download: true
  augmentation: false
  random_erasing_p: 0.0

model:
  name: vit_base_patch16_224.augreg_in21k
  pretrained: true

training:
  epochs: 30
  lr: 0.00003
  weight_decay: 0.0
  label_smoothing: 0.0
  early_stopping:
    enabled: false
